<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>G/M코드 테스트</title>
    <style>
        body { font-family: -apple-system, "Malgun Gothic", sans-serif; background: #f4f7f9; padding: 15px; margin: 0; -webkit-text-size-adjust: 100%; }
        .box { max-width: 500px; margin: 15px auto; background: #fff; padding: 25px; border-radius: 15px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); }
        h2 { color: #2c3e50; text-align: center; margin-top: 0; font-size: 1.3rem; line-height: 1.5; word-break: keep-all; }
        .info-txt { text-align: center; color: #e74c3c; font-size: 0.85rem; margin-bottom: 20px; font-weight: bold; }
        .q-card { border-bottom: 2px solid #f1f1f1; padding: 20px 0; }
        .q-card:last-child { border-bottom: none; }
        .tag { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; color: #fff; margin-bottom: 10px; font-weight: bold; }
        .t-cnc { background: #27ae60; } .t-mc { background: #2980b9; } .t-m { background: #e67e22; }
        .q-txt { font-size: 1.1rem; font-weight: 700; margin-bottom: 15px; color: #34495e; line-height: 1.4; }
        
        .options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .opt-btn { 
            padding: 14px; border: 2px solid #edeff2; border-radius: 12px; background: #fff;
            font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s;
            -webkit-tap-highlight-color: transparent; color: #555;
        }
        .opt-btn.selected { border-color: #3498db; background: #ebf5fb; color: #3498db; }
        .opt-btn.correct { background: #dff0d8; border-color: #d6e9c6; color: #3c763d; }
        .opt-btn.wrong { background: #f2dede; border-color: #ebccd1; color: #a94442; }

        button#submitBtn { width: 100%; padding: 18px; margin-top: 25px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; color: #fff; background: #3498db; cursor: pointer; box-shadow: 0 4px 6px rgba(52, 152, 219, 0.2); }
        #retryBtn { width: 100%; padding: 18px; margin-top: 10px; border: none; border-radius: 12px; font-weight: bold; font-size: 1.1rem; color: #fff; background: #2ecc71; display: none; }
        
        #pass-ui, #lock-ui { display: none; text-align: center; }
        #timer { font-size: 3.5rem; color: #e74c3c; font-weight: bold; margin: 20px 0; letter-spacing: -2px; }
        .score-val { font-size: 2.5rem; color: #27ae60; display: block; margin: 10px 0; }
    </style>
</head>
<body>
    <div id="quiz-ui" class="box">
        <h2>컴퓨터응용선반&밀링<br>G코드, M코드 테스트</h2>
        <p class="info-txt">8점 미만 시 10분간 재응시 불가</p>
        <div id="list"></div>
        <button id="submitBtn" onclick="calculateScore()">정답 제출하기</button>
        <button id="retryBtn" onclick="location.reload()">새로운 문제 도전</button>
    </div>

    <div id="pass-ui" class="box">
        <h2 style="color:#27ae60">🎉 합격 (PASS)</h2>
        <span id="fscore" class="score-val"></span>
        <p style="color:#666;">수고하셨습니다!</p>
        <button onclick="reviewAnswers()" style="background:#3498db; color:#fff; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer;">내 답안 확인</button>
    </div>

    <div id="lock-ui" class="box">
        <h2 style="color:#e74c3c">❌ 차단됨 (FAIL)</h2>
        <p>기준 점수 미달입니다.<br>10분 후 다시 시도하세요.</p>
        <div id="timer">10:00</div>
    </div>

    <script>
        var db = [
            {t:"CNC선반", c:"G00", f:"위치결정(급속 이송)", g:"cnc"}, {t:"CNC선반", c:"G01", f:"직선보간(절삭 이송)", g:"cnc"},
            {t:"CNC선반", c:"G02", f:"원호보간(CW : 시계방향)", g:"cnc"}, {t:"CNC선반", c:"G03", f:"원호보간(CCW : 반시계방향)", g:"cnc"},
            {t:"CNC선반", c:"G04", f:"휴지(Dwell)", g:"cnc"}, {t:"CNC선반", c:"G28", f:"자동 원점 복귀", g:"cnc"},
            {t:"CNC선반", c:"G70", f:"다듬 절삭 사이클", g:"cnc"}, {t:"CNC선반", c:"G71", f:"안·바깥지름 거친 절삭", g:"cnc"},
            {t:"CNC선반", c:"G96", f:"절삭속도 일정제어", g:"cnc"}, {t:"CNC선반", c:"G97", f:"주축 회전수 일정제어", g:"cnc"},
            {t:"머시닝센터", c:"G43", f:"공구길이 보정 +", g:"mc"}, {t:"머시닝센터", c:"G44", f:"공구길이 보정 -", g:"mc"},
            {t:"머시닝센터", c:"G90", f:"절대지령", g:"mc"}, {t:"머시닝센터", c:"G91", f:"증분지령", g:"mc"},
            {t:"M-코드", c:"M03", f:"주축 정회전", g:"m"}, {t:"M-코드", c:"M04", f:"주축 역회전", g:"m"},
            {t:"M-코드", c:"M08", f:"절삭유 ON", g:"m"}, {t:"M-코드", c:"M30", f:"프로그램 종료 및 리와인드", g:"m"}
        ];

        var selectedQuestions = [];
        var userAnswers = [];

        function init() {
            var lock = localStorage.getItem('samil_quiz_v6') || 0;
            if (Date.now() < lock) {
                document.getElementById('quiz-ui').style.display = 'none';
                document.getElementById('lock-ui').style.display = 'block';
                var s = Math.ceil((lock - Date.now()) / 1000);
                setInterval(function() {
                    document.getElementById('timer').innerText = Math.floor(s/60) + ":" + (s%60<10?'0':'') + s%60;
                    if (--s < 0) location.reload();
                }, 1000);
                return;
            }

            db.sort(function(){return 0.5 - Math.random()});
            selectedQuestions = db.slice(0, 10);
            
            var html = "";
            for(var i=0; i<10; i++) {
                var q = selectedQuestions[i];
                var options = generateOptions(q.c);
                html += '<div class="q-card" id="q-'+i+'">' +
                        '<span class="tag t-'+q.g+'">'+q.t+'</span>' +
                        '<div class="q-txt">'+(i+1)+'. '+q.f+'는?</div>' +
                        '<div class="options">';
                for(var j=0; j<4; j++) {
                    html += '<button class="opt-btn" onclick="selectOpt('+i+', \''+options[j]+'\', this)">'+options[j]+'</button>';
                }
                html += '</div></div>';
                userAnswers[i] = null;
            }
            document.getElementById('list').innerHTML = html;
        }

        function generateOptions(correct) {
            var opts = [correct];
            var allCodes = db.map(function(item){return item.c});
            while(opts.length < 4) {
                var randomCode = allCodes[Math.floor(Math.random()*allCodes.length)];
                if(opts.indexOf(randomCode) === -1) opts.push(randomCode);
            }
            return opts.sort(function(){return 0.5 - Math.random()});
        }

        window.selectOpt = function(qIdx, val, btn) {
            userAnswers[qIdx] = val;
            var buttons = btn.parentElement.getElementsByClassName('opt-btn');
            for(var i=0; i<buttons.length; i++) buttons[i].classList.remove('selected');
            btn.classList.add('selected');
        }

        window.calculateScore = function() {
            if(userAnswers.indexOf(null) !== -1) { alert("모든 문제의 정답을 골라주세요!"); return; }
            
            var score = 0;
            for(var i=0; i<10; i++) {
                var qIdxDiv = document.getElementById('q-'+i);
                var btns = qIdxDiv.getElementsByClassName('opt-btn');
                for(var j=0; j<btns.length; j++) {
                    btns[j].disabled = true;
                    if(btns[j].innerText === selectedQuestions[i].c) btns[j].classList.add('correct');
                    else if(btns[j].classList.contains('selected')) btns[j].classList.add('wrong');
                }
                if(userAnswers[i] === selectedQuestions[i].c) score++;
            }

            if(score < 8) {
                localStorage.setItem('samil_quiz_v6', Date.now() + 600000);
                alert("불합격! " + score + "점입니다. 10분 후에 다시 시도하세요.");
                location.reload();
            } else {
                document.getElementById('quiz-ui').style.display = 'none';
                document.getElementById('pass-ui').style.display = 'block';
                document.getElementById('fscore').innerText = score + " / 10 점";
            }
        }

        window.reviewAnswers = function() {
            document.getElementById('pass-ui').style.display = 'none';
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('submitBtn').style.display = 'none';
            document.getElementById('retryBtn').style.display = 'block';
            window.scrollTo(0,0);
        }

        init();
    </script>
</body>
</html>
